apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: my-kustomize-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: staging
  template:
    metadata:
      name: '{{cluster}}-kustomize-app'
    spec:
      project: default
      source:
        repoURL: https://github.com/example/repo
        targetRevision: HEAD
        path: overlays/staging
        kustomize: {}
      destination:
        server: https://kubernetes.default.svc
        namespace: default
