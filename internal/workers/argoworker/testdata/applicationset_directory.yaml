apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: my-directory-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: staging
  template:
    metadata:
      name: '{{cluster}}-directory-app'
    spec:
      project: default
      source:
        repoURL: https://github.com/example/repo
        targetRevision: HEAD
        path: manifests/staging
        directory:
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: default
